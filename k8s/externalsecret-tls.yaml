apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: DungeonVault4e-tls-secret
spec:
  refreshInterval: '15s'
  secretStoreRef:
    name: vault-kubernetes-store
    kind: SecretStore
  target:
    name: DungeonVault4e-tls-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: /DungeonVault4e/DungeonVault4e-tls-secret
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: /DungeonVault4e/DungeonVault4e-tls-secret
        property: tls.key
